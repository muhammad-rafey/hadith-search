# Supabase project configuration for hadith-search.
# Reference: https://supabase.com/docs/guides/cli/config
# Run `supabase start` from the repo root (which contains this `supabase/` dir)
# to spin up Postgres + Studio locally. (Edge Functions were retired — the live
# backend is the Next.js BFF at apps/web/app/api/*.)

project_id = "hadith-search"

[api]
enabled = true
# REST/GraphQL/Realtime endpoint port for the local stack.
port = 54321
# Schemas exposed via PostgREST. `public` is what the Next.js BFF hits (via the
# service-role client); `storage` and `graphql_public` are Supabase defaults we
# keep enabled in case we add file uploads or GraphQL later.
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
# Cap on rows returned by a single PostgREST request. 1000 is the Supabase
# default; the search RPC is bounded by `match_count` so this is just a
# defense-in-depth ceiling.
max_rows = 1000

[db]
# Local Postgres port. Connection string:
#   postgres://postgres:postgres@localhost:54322/postgres
port = 54322
shadow_port = 54320
# Pin to Postgres 15 — pgvector + halfvec + HNSW are well-supported there and
# match what the Supabase managed platform ships by default in 2025.
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Inbucket catches outbound mail in dev (auth confirmations, magic links).
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
# Anonymous sign-in is part of the v1 plan: every visitor gets a stable
# `auth.uid()` without a sign-up wall (see plan/README.md auth row).
enable_anonymous_sign_ins = true
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Edge Functions were retired — the live backend is the Next.js BFF
# (apps/web/app/api/*). The [edge_runtime] / [functions.*] blocks were removed
# along with supabase/functions/.

[analytics]
enabled = false

[experimental]
# pgvector + pg_trgm are enabled via the migration in `migrations/0001_init.sql`
# — Supabase loads available extensions at DB start; the migration runs
# `create extension if not exists` to actually install them in the public
# schema.
