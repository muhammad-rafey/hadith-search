# Automated dependency update PRs. Groups minor/patch bumps to cut noise;
# majors (breaking) open individually so they can be reviewed deliberately.
version: 2
updates:
  - package-ecosystem: "npm"
    # Single root entry on purpose: this is a pnpm workspace with ONE lockfile
    # at the repo root. From "/", Dependabot is workspace-aware — it bumps every
    # workspace package's package.json AND regenerates the root pnpm-lock.yaml in
    # one PR. Listing the sub-package dirs (apps/*, packages/*) separately made
    # Dependabot emit manifest-only PRs that left the root lockfile stale, so
    # `pnpm install --frozen-lockfile` (Vercel + CI default) failed on every one.
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # apps/mobile uses nativewind@4, whose Metro plugin only supports
      # Tailwind v3 ("NativeWind only supports Tailwind CSS v3"). Dependabot's
      # single workspace entry can't scope an ignore to one package, so block
      # tailwindcss MAJOR bumps for the whole workspace: it keeps apps/mobile
      # pinned to v3 (apps/web stays on v4) while minor/patch bumps still flow
      # to both. Bump tailwindcss majors by hand after checking NativeWind
      # supports the new major. (Regression context: PR #17 broke the EAS build
      # by bumping both web and mobile to v4 at once.)
      - dependency-name: "tailwindcss"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
