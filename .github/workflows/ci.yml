name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # pnpm version is read from package.json `packageManager` field
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
          NEXT_PUBLIC_SENTRY_DSN: ""
          SENTRY_DSN: ""
          NEXT_PUBLIC_POSTHOG_KEY: ""
          NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
          COHERE_API_KEY: ""
          SENTRY_SUPPRESS_GLOBAL_ERROR_HANDLER_FILE_WARNING: "1"

  deno-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Typecheck Edge Functions
        # Each function has its own deno.json import map. `deno check` discovers
        # config from the CWD (repo root), not the entry file, so the map was
        # never applied and npm:/jsr: specifiers failed to resolve. Pass the
        # config explicitly per function.
        run: |
          deno check --config supabase/functions/search/deno.json supabase/functions/search/index.ts
          deno check --config supabase/functions/feedback/deno.json supabase/functions/feedback/index.ts
